<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">


<div class="progress mt-3" style="width: 70% !important;margin-left: 166px !important;margin-top: 80px !important;">
    <div class="progress-bar" role="progressbar" style="width: 10%" aria-valuenow="10" aria-valuemin="0"
        aria-valuemax="100" id="progress-bar"></div>
</div>

<script>
    let progressBarValue = 20;
    let data = setInterval(() => {
        document.getElementById('progress-bar').style.width = progressBarValue + '%';
        console.log(progressBarValue)
        progressBarValue += 10;
        if (progressBarValue > 100) {
            document.getElementById('progress-bar').style.backgroundColor = 'red';
            clearInterval(data);
        }
    }, 1000);

</script>
