<script>
    let n = 1;
    for (let i = 1; i <= 5; i++) {
        let res = [];
        for (let j = 1; j <= i; j++) {
            res.push(n++);
        }
        console.log(res.join(" "))
    }

    for (let i = 5; i >= 1; i--) {
        let res = [];
        for (let j = 1; j <= i; j++) {
            res.push(n++);
        }
        console.log(res.join(" "))
    }
</script>
